<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Калькулятор</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --r: 26px;
  --gap: 10px;
  --btn: 78px;
}

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  background: #000;
  overflow: hidden;
  position: relative;
}

.bg {
  position: fixed;
  inset: 0;
  z-index: 0;
}

.bg-blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(90px);
  animation: drift 14s ease-in-out infinite;
}
.bg-blob:nth-child(1) {
  width: 560px; height: 560px;
  background: radial-gradient(circle, rgba(80,170,255,0.6), transparent 70%);
  top: -140px; left: -120px;
  animation-delay: 0s;
}
.bg-blob:nth-child(2) {
  width: 460px; height: 460px;
  background: radial-gradient(circle, rgba(190,100,255,0.5), transparent 70%);
  bottom: -100px; right: -100px;
  animation-delay: -5s;
}
.bg-blob:nth-child(3) {
  width: 320px; height: 320px;
  background: radial-gradient(circle, rgba(255,140,80,0.4), transparent 70%);
  top: 35%; left: 50%;
  animation-delay: -9s;
}
.bg-blob:nth-child(4) {
  width: 280px; height: 280px;
  background: radial-gradient(circle, rgba(60,230,160,0.35), transparent 70%);
  top: 65%; left: 5%;
  animation-delay: -3s;
}

@keyframes drift {
  0%, 100% { transform: translate(0,0) scale(1); }
  33%       { transform: translate(50px,35px) scale(1.1); }
  66%       { transform: translate(-35px,25px) scale(0.93); }
}

.calc {
  position: relative;
  z-index: 1;
  width: 352px;
  padding: 0 16px 24px;
  animation: appear 0.6s cubic-bezier(0.16,1,0.3,1) both;
}

@keyframes appear {
  from { opacity: 0; transform: scale(0.88) translateY(24px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

.display {
  padding: 32px 8px 20px;
  text-align: right;
  min-height: 128px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  gap: 4px;
}

.display-history {
  font-size: 17px;
  font-weight: 300;
  color: rgba(255,255,255,0.32);
  min-height: 22px;
  letter-spacing: -0.01em;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.display-main {
  font-size: 76px;
  font-weight: 200;
  color: #fff;
  letter-spacing: -0.04em;
  line-height: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  transition: font-size 0.12s ease;
  text-shadow: 0 2px 30px rgba(255,255,255,0.12);
}
.display-main.s1 { font-size: 56px; }
.display-main.s2 { font-size: 40px; }
.display-main.s3 { font-size: 28px; }

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: var(--gap);
}

button {
  height: var(--btn);
  border: none;
  border-radius: var(--r);
  font-family: inherit;
  font-size: 28px;
  font-weight: 300;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  outline: none;
  letter-spacing: -0.01em;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.14s cubic-bezier(0.34,1.56,0.64,1);
  backdrop-filter: blur(28px) saturate(2) brightness(1.08);
  -webkit-backdrop-filter: blur(28px) saturate(2) brightness(1.08);
}

button:active { transform: scale(0.88); }

/* top sheen */
button::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 50%;
  border-radius: inherit;
  background: linear-gradient(180deg,
    rgba(255,255,255,0.20) 0%,
    rgba(255,255,255,0.0) 100%
  );
  pointer-events: none;
  z-index: 2;
}

/* border */
button::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  border: 1px solid rgba(255,255,255,0.20);
  pointer-events: none;
  z-index: 3;
}

.n {
  background: rgba(255,255,255,0.13);
  color: #fff;
  box-shadow: 0 4px 24px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.18);
}
.n:hover { background: rgba(255,255,255,0.19); }

.zero {
  grid-column: span 2;
  border-radius: 40px;
  text-align: left;
  padding-left: 28px;
}

.op {
  background: rgba(255,155,40,0.28);
  color: rgba(255,215,100,0.95);
  box-shadow: 0 4px 24px rgba(255,120,0,0.12), inset 0 1px 0 rgba(255,200,80,0.2);
}
.op::after { border-color: rgba(255,175,55,0.28) !important; }
.op:hover  { background: rgba(255,155,40,0.38); }
.op.active {
  background: rgba(255,165,50,0.82);
  color: #fff;
  box-shadow: 0 0 0 2.5px rgba(255,180,60,0.55), 0 8px 32px rgba(255,130,0,0.3);
}

.fn {
  background: rgba(255,255,255,0.20);
  color: rgba(255,255,255,0.88);
  font-size: 19px;
  font-weight: 400;
  box-shadow: 0 4px 24px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.28);
}
.fn:hover { background: rgba(255,255,255,0.28); }

.eq {
  background: linear-gradient(170deg, rgba(255,175,55,0.95), rgba(255,135,30,0.9));
  color: #fff;
  font-size: 34px;
  box-shadow: 0 6px 28px rgba(255,130,0,0.35), inset 0 1px 0 rgba(255,225,130,0.35);
}
.eq::after { border-color: rgba(255,200,80,0.3) !important; }
.eq:hover  { filter: brightness(1.1); }

.ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.16);
  transform: translate(-50%,-50%) scale(0);
  animation: rpl 0.5s ease-out forwards;
  pointer-events: none;
  z-index: 10;
}
@keyframes rpl {
  to { transform: translate(-50%,-50%) scale(5); opacity: 0; }
}
</style>
</head>
<body>

<div class="bg">
  <div class="bg-blob"></div>
  <div class="bg-blob"></div>
  <div class="bg-blob"></div>
  <div class="bg-blob"></div>
</div>

<div class="calc">
  <div class="display">
    <div class="display-history" id="hist"></div>
    <div class="display-main" id="main">0</div>
  </div>

  <div class="grid">
    <button class="fn" id="ac"    onclick="clearAll()">AC</button>
    <button class="fn"            onclick="toggleSign()">⁺∕₋</button>
    <button class="fn"            onclick="percent()">%</button>
    <button class="op" id="odiv"  onclick="setOp('÷')">÷</button>

    <button class="n" onclick="inp('7')">7</button>
    <button class="n" onclick="inp('8')">8</button>
    <button class="n" onclick="inp('9')">9</button>
    <button class="op" id="omul"  onclick="setOp('×')">×</button>

    <button class="n" onclick="inp('4')">4</button>
    <button class="n" onclick="inp('5')">5</button>
    <button class="n" onclick="inp('6')">6</button>
    <button class="op" id="osub"  onclick="setOp('−')">−</button>

    <button class="n" onclick="inp('1')">1</button>
    <button class="n" onclick="inp('2')">2</button>
    <button class="n" onclick="inp('3')">3</button>
    <button class="op" id="oadd"  onclick="setOp('+')">+</button>

    <button class="n zero"        onclick="inp('0')">0</button>
    <button class="n"             onclick="inpDot()">.</button>
    <button class="eq"            onclick="calc()">=</button>
  </div>
</div>

<script>
const mainEl = document.getElementById('main');
const histEl = document.getElementById('hist');
const acBtn  = document.getElementById('ac');

let cur = '0', prev = null, op = null, fresh = false;

const opMap = { '÷':'odiv', '×':'omul', '−':'osub', '+':'oadd' };

function setActive(o) {
  Object.values(opMap).forEach(id => document.getElementById(id).classList.remove('active'));
  if (o && opMap[o]) document.getElementById(opMap[o]).classList.add('active');
}

function render() {
  const l = cur.replace('-','').length;
  mainEl.className = 'display-main' + (l > 12 ? ' s3' : l > 9 ? ' s2' : l > 6 ? ' s1' : '');
  mainEl.textContent = cur;
  acBtn.textContent = (cur !== '0' || prev) ? 'C' : 'AC';
}

function inp(d) {
  if (fresh) { cur = d; fresh = false; }
  else cur = cur === '0' ? d : cur.length < 15 ? cur + d : cur;
  render();
}

function inpDot() {
  if (fresh) { cur = '0.'; fresh = false; }
  else if (!cur.includes('.')) cur += '.';
  render();
}

function setOp(o) {
  if (op && !fresh) calc(true);
  prev = cur; op = o; fresh = true;
  histEl.textContent = prev + ' ' + op;
  setActive(o);
}

function calc(chain = false) {
  if (!op || prev === null) return;
  const a = parseFloat(prev), b = parseFloat(cur);
  let r;
  if (op === '+') r = a + b;
  else if (op === '−') r = a - b;
  else if (op === '×') r = a * b;
  else if (op === '÷') r = b === 0 ? null : a / b;

  if (!chain) { histEl.textContent = prev + ' ' + op + ' ' + cur + ' ='; setActive(null); }
  cur = r === null ? 'Ошибка' : fmt(r);
  if (!chain) op = null;
  prev = null; fresh = true;
  render();
}

function fmt(n) {
  if (!isFinite(n)) return 'Ошибка';
  const s = parseFloat(n.toPrecision(12)).toString();
  return s.length > 15 ? n.toExponential(5) : s;
}

function clearAll() {
  cur = '0'; prev = null; op = null; fresh = false;
  histEl.textContent = '';
  setActive(null); render();
}

function toggleSign() {
  if (cur === '0' || cur === 'Ошибка') return;
  cur = cur.startsWith('-') ? cur.slice(1) : '-' + cur;
  render();
}

function percent() {
  const n = parseFloat(cur);
  cur = fmt(prev !== null ? n / 100 * parseFloat(prev) : n / 100);
  render();
}

document.addEventListener('keydown', e => {
  if (e.key >= '0' && e.key <= '9') inp(e.key);
  else if (e.key === '.') inpDot();
  else if (e.key === '+') setOp('+');
  else if (e.key === '-') setOp('−');
  else if (e.key === '*') setOp('×');
  else if (e.key === '/') { e.preventDefault(); setOp('÷'); }
  else if (e.key === 'Enter' || e.key === '=') calc();
  else if (e.key === 'Escape') clearAll();
  else if (e.key === 'Backspace') { cur = cur.length > 1 ? cur.slice(0,-1) : '0'; render(); }
});

document.querySelectorAll('button').forEach(btn => {
  btn.addEventListener('click', e => {
    const r = document.createElement('span');
    r.className = 'ripple';
    const rc = btn.getBoundingClientRect();
    const sz = Math.max(rc.width, rc.height);
    r.style.cssText = `left:${e.clientX-rc.left}px;top:${e.clientY-rc.top}px;width:${sz}px;height:${sz}px`;
    btn.appendChild(r);
    setTimeout(() => r.remove(), 500);
  });
});
</script>
</body>
</html>
